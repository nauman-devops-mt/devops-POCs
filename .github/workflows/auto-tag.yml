name: Semantic Auto-Tag

on:
  push:
    branches:
      - devnet
      - testnet
      - mainnet

permissions:
  contents: write

jobs:
  tag:
    name: Bump & Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"

          # ── Helpers ─────────────────────────────────────────────────────────

          # Returns 0 (true) if semver A is strictly greater than B
          version_gt() {
            local sorted_max
            sorted_max=$(printf '%s\n' "$1" "$2" | sort -V | tail -1)
            [[ "$sorted_max" == "$1" && "$1" != "$2" ]]
          }

          # Strip env prefix and leading v to get bare X.Y.Z
          get_base() {
            echo "$1" | sed -E 's/^(devnet-v|testnet-v|v)//'
          }

          # Apply conventional-commit bump rules to a base version X.Y.Z
          # Reads commits text from second arg; echoes new X.Y.Z to stdout
          bump_from() {
            local base="$1" commits="$2"
            local MAJOR MINOR PATCH BUMP

            # Only tag when explicitly requested — no implicit defaults
            if   echo "$commits" | grep -qE '(^|[[:space:]])#major([[:space:]]|$)'; then BUMP="major"
            elif echo "$commits" | grep -qE '(^|[[:space:]])#minor([[:space:]]|$)'; then BUMP="minor"
            elif echo "$commits" | grep -qE '(^|[[:space:]])#patch([[:space:]]|$)'; then BUMP="patch"
            else
              echo "skip:"
              return 0
            fi

            MAJOR=$(echo "$base" | cut -d. -f1)
            MINOR=$(echo "$base" | cut -d. -f2)
            PATCH=$(echo "$base" | cut -d. -f3)

            case "$BUMP" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch) PATCH=$((PATCH+1)) ;;
            esac

            echo "${BUMP}:${MAJOR}.${MINOR}.${PATCH}"
          }

          # ── Gather latest tag for each environment ───────────────────────────
          LATEST_DEVNET_TAG=$( git tag --list 'devnet-v*'              | sort -V | tail -1)
          LATEST_TESTNET_TAG=$(git tag --list 'testnet-v*'             | sort -V | tail -1)
          LATEST_MAINNET_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)

          if [ -n "$LATEST_DEVNET_TAG"  ]; then DEVNET_BASE=$(get_base  "$LATEST_DEVNET_TAG");  else DEVNET_BASE="0.0.0";  fi
          if [ -n "$LATEST_TESTNET_TAG" ]; then TESTNET_BASE=$(get_base "$LATEST_TESTNET_TAG"); else TESTNET_BASE="0.0.0"; fi
          if [ -n "$LATEST_MAINNET_TAG" ]; then MAINNET_BASE=$(get_base "$LATEST_MAINNET_TAG"); else MAINNET_BASE="0.0.0"; fi

          echo "devnet  latest : ${LATEST_DEVNET_TAG:-none}  → base $DEVNET_BASE"
          echo "testnet latest : ${LATEST_TESTNET_TAG:-none} → base $TESTNET_BASE"
          echo "mainnet latest : ${LATEST_MAINNET_TAG:-none} → base $MAINNET_BASE"
          echo "---"

          # ── Branch-specific version logic ────────────────────────────────────
          BUMP=""
          NEW_TAG=""

          case "$BRANCH" in

            devnet)
              # devnet always derives its version from conventional commits
              if [ -n "$LATEST_DEVNET_TAG" ]; then
                FROM_REF="$LATEST_DEVNET_TAG";  FROM_BASE="$DEVNET_BASE"
              elif [ -n "$LATEST_MAINNET_TAG" ]; then
                FROM_REF="$LATEST_MAINNET_TAG"; FROM_BASE="$MAINNET_BASE"
              else
                FROM_REF=""; FROM_BASE="0.0.0"
              fi

              if [ -n "$FROM_REF" ]; then
                COMMITS=$(git log "${FROM_REF}..HEAD" --pretty=format:"%s%n%b")
              else
                COMMITS=$(git log --pretty=format:"%s%n%b")
              fi

              if [ -z "$COMMITS" ]; then
                echo "No new commits since ${FROM_REF:-start} — skipping."
                echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
              fi

              _result=$(bump_from "$FROM_BASE" "$COMMITS"); BUMP="${_result%%:*}"; NEW_BASE="${_result#*:}"
              if [ "$BUMP" = "skip" ]; then
                echo "No #major/#minor/#patch found — skipping."
                echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
              fi
              NEW_TAG="devnet-v${NEW_BASE}"
              ;;

            testnet)
              if version_gt "$DEVNET_BASE" "$TESTNET_BASE"; then
                # Promotion from devnet: inherit its version
                echo "Promotion: devnet $DEVNET_BASE > testnet $TESTNET_BASE"
                NEW_TAG="testnet-v${DEVNET_BASE}"
                BUMP="promotion"
              else
                # Direct push / hotfix straight to testnet
                if [ -n "$LATEST_TESTNET_TAG" ]; then
                  FROM_REF="$LATEST_TESTNET_TAG";  FROM_BASE="$TESTNET_BASE"
                elif [ -n "$LATEST_MAINNET_TAG" ]; then
                  FROM_REF="$LATEST_MAINNET_TAG"; FROM_BASE="$MAINNET_BASE"
                else
                  FROM_REF=""; FROM_BASE="0.0.0"
                fi

                if [ -n "$FROM_REF" ]; then
                  COMMITS=$(git log "${FROM_REF}..HEAD" --pretty=format:"%s%n%b")
                else
                  COMMITS=$(git log --pretty=format:"%s%n%b")
                fi

                if [ -z "$COMMITS" ]; then
                  echo "No new commits since ${FROM_REF:-start} — skipping."
                  echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
                fi

                _result=$(bump_from "$FROM_BASE" "$COMMITS"); BUMP="${_result%%:*}"; NEW_BASE="${_result#*:}"
                if [ "$BUMP" = "skip" ]; then
                  echo "No #major/#minor/#patch found — skipping."
                  echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
                fi
                NEW_TAG="testnet-v${NEW_BASE}"
              fi
              ;;

            mainnet)
              if version_gt "$TESTNET_BASE" "$MAINNET_BASE"; then
                # Promotion from testnet: inherit its version
                echo "Promotion: testnet $TESTNET_BASE > mainnet $MAINNET_BASE"
                NEW_TAG="v${TESTNET_BASE}"
                BUMP="promotion"
              else
                # Direct push / hotfix straight to mainnet
                if [ -n "$LATEST_MAINNET_TAG" ]; then
                  FROM_REF="$LATEST_MAINNET_TAG"; FROM_BASE="$MAINNET_BASE"
                else
                  FROM_REF=""; FROM_BASE="0.0.0"
                fi

                if [ -n "$FROM_REF" ]; then
                  COMMITS=$(git log "${FROM_REF}..HEAD" --pretty=format:"%s%n%b")
                else
                  COMMITS=$(git log --pretty=format:"%s%n%b")
                fi

                if [ -z "$COMMITS" ]; then
                  echo "No new commits since ${FROM_REF:-start} — skipping."
                  echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
                fi

                _result=$(bump_from "$FROM_BASE" "$COMMITS"); BUMP="${_result%%:*}"; NEW_BASE="${_result#*:}"
                if [ "$BUMP" = "skip" ]; then
                  echo "No #major/#minor/#patch found — skipping."
                  echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
                fi
                NEW_TAG="v${NEW_BASE}"
              fi
              ;;
          esac

          # ── Idempotency: skip if tag already exists ──────────────────────────
          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" > /dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          echo "New tag : $NEW_TAG  (bump: $BUMP)"
          echo "skip=false"       >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP"       >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        if: steps.version.outputs.skip != 'true'
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git tag -a "$NEW_TAG" \
            -m "Release $NEW_TAG (bump: ${{ steps.version.outputs.bump }})"
          git push origin "$NEW_TAG"
          echo "Tagged and pushed: $NEW_TAG"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true' && github.ref_name == 'mainnet'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: "Release ${{ steps.version.outputs.new_tag }}"
          generate_release_notes: true
